<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JsSIP Demo</title>
<!--    <script src="https://cdn.jsdelivr.net/npm/jssip@3.10.0/dist/jssip.min.js"></script>-->
<!--    <script src="https://cdnjs.cloudflare.com/ajax/libs/jssip/3.10.0/jssip.min.js"></script>-->
        <script src="jssip.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input, button {
            padding: 8px;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:disabled {
            background-color: #cccccc;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            background-color: #f0f0f0;
        }
        .call-controls {
            display: none;
            margin-top: 15px;
        }
        video {
            width: 100%;
            background: #000;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<h1>JsSIP Demo</h1>
<div class="container">
    <div>
        <label for="sipUri">SIP URI:</label>
        <input type="text" id="sipUri" placeholder="sip:user@domain.com">
    </div>
    <div>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password">
    </div>
    <div>
        <label for="wsServer">WebSocket Server:</label>
        <input type="text" id="wsServer" placeholder="wss://sip.domain.com" value="wss://sip.domain.com">
    </div>

    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>

    <div class="status" id="status">Not connected</div>

    <div>
        <label for="callTo">Call to:</label>
        <input type="text" id="callTo" placeholder="sip:user@domain.com" disabled>
        <button id="callBtn" disabled>Call</button>
    </div>

    <div class="call-controls" id="callControls">
        <button id="answerBtn">Answer</button>
        <button id="hangupBtn">Hangup</button>
        <button id="muteBtn">Mute</button>
        <button id="holdBtn">Hold</button>
    </div>

    <div>
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
    </div>

    <div id="log"></div>
</div>

<script src="app.js"></script>
</body>
</html>
