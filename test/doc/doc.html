<script>

    (function () {
        var config = {}

        function createParentNav(parent, pid) {
            var childText = "";
            parent.child.forEach(function (v, cid) {
                childText += createChildNav(v, pid, cid);
            });
            console.log(pid);
            var result = " <li>\n" +
                "                    <a data-pid='" + pid + "' class=\"navparent\">" + parent.title + "</a>\n" +
                "                    <ul>\n" +
                childText +
                "                    </ul>\n" +
                "                </li>";
            return result;
        }

        function createChildNav(child, pid, cid) {
            var child = "<li><a data-pid='" + pid + "' data-cid='" + cid + "'  class=\"navchild\">" + child.title + "</a></li>\n";
            return child;
        }

        function loadConfig() {
            $.ajax({
                type: "get",
                url: "./config.json",
                dataType: "text",
                success: function (res) {
                    var pon = eval('(' + res + ')');
                    console.log(pon.nav);
                    config = pon;
                    const inx_nav = $(".inx_nav");
                    var navText = "";
                    pon.nav.forEach(function (v, i) {
                        console.log(v);
                        navText += createParentNav(v, i);
                    });
                    inx_nav.html(navText);
                    addNavListener();
                }
            })
        }

        function addNavListener() {
            $(".navchild").click(function (e) {
                console.log(e);
                var pid = $(this).attr("data-pid");
                var cid = $(this).attr("data-cid");
                console.log(pid);

            $(".navparent").click(function (e) {
                console.log(e);
                var pid = $(this).attr("data-pid");

            });

        }
