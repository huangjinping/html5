<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位功能（带重试机制）</title>
    <style>
        .container {
            text-align: center;
            margin-top: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
        }
        #locationInfo {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            min-height: 100px;
            text-align: left;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .error-hint {
            color: #dc3545;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>获取当前位置</h1>
    <button onclick="getLocation()">获取定位</button>
    <div id="locationInfo">定位信息将显示在这里...</div>
</div>

<script>
    const locationInfo = document.getElementById('locationInfo');
    let permissionDeniedCount = 0; // 记录拒绝次数

    function getLocation() {
        if (navigator.geolocation) {
            locationInfo.textContent = "正在获取位置信息，请稍候...";
            navigator.geolocation.getCurrentPosition(
                showPosition,
                showError,
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 0
                }
            );
        } else {
            locationInfo.textContent = "您的浏览器不支持地理定位功能。";
        }
    }

    function showPosition(position) {
        // 重置拒绝次数
        permissionDeniedCount = 0;

        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        locationInfo.innerHTML = `
                定位成功！<br>
                纬度：${latitude.toFixed(6)}<br>
                经度：${longitude.toFixed(6)}<br>
                精度：约 ${accuracy.toFixed(0)} 米<br>
                <a href="https://maps.baidu.com/search/${latitude},${longitude}" target="_blank">
                    在百度地图查看位置
                </a>
            `;
    }

    function showError(error) {
        switch(error.code) {
            case error.PERMISSION_DENIED:
                permissionDeniedCount++;
                // 第一次拒绝：提示并重试
                if (permissionDeniedCount === 1) {
                    locationInfo.innerHTML = `
                            <div class="error-hint">您拒绝了定位请求，该功能需要定位权限才能正常使用</div>
                            请允许定位权限以获取位置信息<br>
                            <button onclick="getLocation()">再次尝试获取定位</button>
                        `;
                }
                // 多次拒绝：引导手动开启
                else {
                    locationInfo.innerHTML = `
                            <div class="error-hint">仍然无法获取定位权限</div>
                            您可以手动开启定位权限：<br>
                            1. 点击浏览器地址栏左侧的"锁"图标<br>
                            2. 在权限设置中允许"位置"访问<br>
                            <button onclick="getLocation()">权限开启后重试</button>
                        `;
                }
                break;
            case error.POSITION_UNAVAILABLE:
                locationInfo.innerHTML = `
                        位置信息不可用<br>
                        <button onclick="getLocation()">再次尝试</button>
                    `;
                break;
            case error.TIMEOUT:
                locationInfo.innerHTML = `
                        定位请求超时，请稍后再试<br>
                        <button onclick="getLocation()">再次尝试</button>
                    `;
                break;
            case error.UNKNOWN_ERROR:
                locationInfo.innerHTML = `
                        发生未知错误<br>
                        <button onclick="getLocation()">再次尝试</button>
                    `;
                break;
        }
    }
</script>
</body>
</html>
