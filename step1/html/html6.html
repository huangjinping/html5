<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .parent {
            background-color: #0bb20c;
            text-align: center;
            position: relative;
        }

        .child2 {
            width: 80%;
            height: 100px;
            background-color: #f0ad4e;
            position: absolute;
            top: 0;
            margin-left: 50%;
            transform: translate(-50%, 0)
        }

        .child1 {
            width: 90%;
            height: 100px;
            background-color: #00BFF0;
            margin: 80px auto;
        }
    </style>
</head>
<body>


<div class="parent">

    <div style="height: 1px"></div>
    <div class="child2"></div>
    <div class="child1"></div>

    <div> </div>

</div>

</body>
</html>
